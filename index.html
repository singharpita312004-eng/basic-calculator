<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <div class="header">
            <h1>CalcPro</h1>
            <button id="theme-toggle">🌙</button>
        </div>
        
        <div class="history" id="history"></div>
        <input type="text" id="display" readonly placeholder="0">

        <div class="scientific-row">
            <button onclick="scientific('sin')">sin</button>
            <button onclick="scientific('cos')">cos</button>
            <button onclick="scientific('tan')">tan</button>
            <button onclick="scientific('log')">log</button>
            <button onclick="scientific('sqrt')">√</button>
            <button onclick="appendValue('**')">xʸ</button>
        </div>

        <div class="buttons">
            <button onclick="clearAll()" class="operator-ac">AC</button>
            <button onclick="clearEntry()" class="operator-c">C</button>
            <button onclick="appendValue('(')">(</button>
            <button onclick="appendValue(')')">)</button>
            <button onclick="deleteLast()" class="operator-del">⌫</button>

            <button onclick="scientific('pi')">π</button>
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('/')" class="operator">÷</button>

            <button onclick="scientific('fact')">x!</button>
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('*')" class="operator">×</button>

            <button onclick="appendValue('%')">%</button>
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="appendValue('-')" class="operator">−</button>

            <button onclick="appendValue('**2')">x²</button>
            <button onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
            <button onclick="calculate()" class="operator-equal">=</button>
            <button onclick="appendValue('+')" class="operator">+</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
